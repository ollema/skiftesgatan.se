<!doctype html>
<html lang="sv">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Offline — BRF Skiftesgatan 4</title>
		<style>
			body {
				font-family: 'Source Serif 4', Georgia, serif;
				background-color: #f5f0e8;
				color: #2c2a25;
				margin: 0;
				padding: 0;
				display: flex;
				align-items: center;
				justify-content: center;
				min-height: 100vh;
				text-align: center;
				line-height: 1.6;
			}
			.container {
				max-width: 480px;
				padding: 2.5rem 1rem;
			}
			h1 {
				font-family: 'DM Serif Display', Georgia, serif;
				font-weight: 400;
				font-size: 2rem;
				margin-bottom: 1rem;
			}
			p {
				color: #6b6560;
				margin-bottom: 1.5rem;
			}
			button {
				background: #4a6741;
				color: #fdfbf7;
				border: none;
				border-radius: 3px;
				padding: 0.5rem 1.5rem;
				font-family: 'Source Serif 4', Georgia, serif;
				font-size: 0.875rem;
				letter-spacing: 0.05em;
				text-transform: uppercase;
				cursor: pointer;
			}
			button:hover {
				background: #3b5334;
			}
		</style>
	</head>
	<body>
		<div class="container">
			<h1>Ingen anslutning</h1>
			<p>
				Det gick inte att ladda sidan. Kontrollera din internetanslutning och försök igen.
			</p>
			<button onclick="location.reload()">Försök igen</button>
		</div>
	</body>
</html>
